upstream reportespiolis_upstream {
    server sistema-reportespiolis:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Ruta sugerida para el build estatico de apps/spa/out
    root /var/www/web-telecom/apps/spa/out;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # Compatibilidad con ruta historica /empa
    location = /empa {
        return 301 /pedidos/;
    }

    location /empa/ {
        rewrite ^/empa/(.*)$ /pedidos/$1 permanent;
    }

    # Reportes queda fuera del monorepo SPA
    location = /reporte {
        return 301 /reporte/;
    }

    location /reporte/ {
        proxy_pass http://reportespiolis_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /reporte;
        proxy_buffering off;
    }

    # Cache de assets estaticos del export
    location ~* \.(?:css|js|woff2|woff|ttf|svg|ico|png|jpg|jpeg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Fallback SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}

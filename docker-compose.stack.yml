# DEPRECADO: mover despliegue a telecom-deploy/docker-compose.yml
services:
  nginx:
    build:
      context: .
      dockerfile: infra/docker/nginx/Dockerfile
    restart: unless-stopped
    environment:
      BASIC_AUTH_USER: "${BASIC_AUTH_USER:-comu}"
      BASIC_AUTH_PASS: "${BASIC_AUTH_PASS:-adminwiz}"
    depends_on:
      - spa
      - reportespiolis
    ports:
      - "${WEB_HTTPS_PORT:-443}:443"
    networks:
      - telecom_network

  spa:
    build:
      context: .
      dockerfile: apps/spa/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DEUDORES_DB_PATH: /app/data/deudores.sqlite
      INTERNALS_XLSX_PATH: /app/data/internos.xlsx
    volumes:
      - spa_data:/app/data
    networks:
      - telecom_network

  reportespiolis:
    build:
      context: ../servicios-telecom/cont-reportespiolis
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_PATH: /app/data/database.sqlite
    volumes:
      - /mnt/compartido:/mnt/compartido:ro
      - reportes_data:/app/data
      - reportes_logs:/app/logs
    networks:
      - telecom_network

volumes:
  spa_data:
  reportes_data:
  reportes_logs:

networks:
  telecom_network:
    name: telecom_stack_network

name: Publish SPA image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (example: v1.0.0)"
        required: true
        default: latest

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/spa/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/telecom-spa:${{ inputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/telecom-spa:${{ github.sha }}
